name: Weekly iOS Idea Scout

on:
  schedule:
    # 매월 첫째 금요일 오후 5시 Pacific (= 둘째주 토요일 00:00 UTC)
    # cron은 "매월 1-7일 중 토요일"로 표현됨
    - cron: '0 0 1-7 * 6'

jobs:
  scout:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scout
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python scripts/scout.py

      - name: Commit report
        run: |
          git config user.name "ios-idea-scout-bot"
          git config user.email "bot@users.noreply.github.com"
          git add reports/
          git diff --staged --quiet || git commit -m "Weekly report $(date +%Y-%m-%d)"
          git push
